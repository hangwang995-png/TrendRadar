app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "office_hours"

platforms:
  enabled: false
  sources:
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 4
  feeds:
    - id: "arxiv-cs-lg"
      name: "arXiv cs.LG"
      url: "https://arxiv.org/rss/cs.LG"
      max_age_days: 5

    - id: "arxiv-stat-ml"
      name: "arXiv stat.ML"
      url: "https://arxiv.org/rss/stat.ML"
      max_age_days: 5

    - id: "arxiv-cs-ai"
      name: "arXiv cs.AI"
      url: "https://arxiv.org/rss/cs.AI"
      max_age_days: 5

    - id: "arxiv-cs-ro"
      name: "arXiv cs.RO"
      url: "https://arxiv.org/rss/cs.RO"
      max_age_days: 5

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 4

filter:
  method: "ai"
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.9
  reclassify_threshold: 0.78
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - rss
    - ai_analysis

  regions:
    hotlist: false
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true

  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""

    dingtalk:
      webhook_url: ""

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      bot_token: ""
      chat_id: ""

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"

  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 0

  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7

ai:
  model: "openai/openrouter/free"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 0.2
  max_tokens: 2000
  num_retries: 2
  fallback_models:
    - "openai/qwen/qwen3-next-80b-a3b-instruct:free"

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "daily"
  max_news_for_analysis: 12
  include_rss: true
  include_standalone: false
  include_rank_timeline: false

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: false

advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000

  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"